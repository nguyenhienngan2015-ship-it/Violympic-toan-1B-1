<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Violympic Toán 1</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px}
.box{background:#fff;padding:15px;border-radius:10px;margin-bottom:20px}
button{padding:10px;background:#3498db;color:#fff;border:none;border-radius:6px;cursor:pointer}
button:hover{background:#2980b9}
.hidden{display:none}
#timer{color:red;font-weight:bold;font-size:20px}
.q{margin:12px 0}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
</style>
</head>

<body>

<h1>📘 Violympic Toán 1</h1>
<h2>👩‍🏫 Giáo viên: Phạm Thị Ngần<h2>

<!-- LOGIN -->
<div class="box" id="loginBox">
<select id="studentName">
<option value="">-- Chọn học sinh --</option>
<option>Nguyễn Yến</option>
<option>Ninh Yến</option>
<option>Ngọc</option>
<option>Bảo</option>
<option>Hân</option>
<option>Khánh</option>
<option>Tuấn</option>
<option>Bảo An</option>
<option>Bảo Ngọc</option>
<option>Long</option>
<option>Hằng</option>
<option>Tùng</option>
</select><br><br>
<button onclick="startTest()">▶️ Vào làm bài</button>
<button onclick="showTeacher()">👩‍🏫 Giáo viên</button>
</div>

<!-- TEST -->
<div class="box hidden" id="testBox">
⏱ Thời gian còn lại: <span id="timer">30:00</span>
<div id="quiz"></div>
<button onclick="submitTest()">📤 Nộp bài</button>
</div>

<!-- RESULT -->
<div class="box hidden" id="resultBox">
<h2 id="result"></h2>
<button onclick="location.reload()">🔁 Về trang đầu</button>
</div>

<!-- TEACHER -->
<div class="box hidden" id="teacherBox">
<h2>📊 BẢNG ĐIỂM</h2>
<table>
<thead>
<tr>
<th>STT</th>
<th>Học sinh</th>
<th>Điểm</th>
<th>Thời gian</th>
</tr>
</thead>
<tbody id="scoreTable"></tbody>
</table><br>
<button onclick="backHome()">⬅️ Quay lại</button>
</div>

<script>
let time=1800,timer,currentStudent="";

const quizData=[
{q:"👮‍♀️👷‍♀️💂‍♀️👩‍⚕️🕵️‍♀️<br>Có bao nhiêu người bên trái bác sĩ?",a:["2","4","1","3"],d:2},
{q:"Tính: 4 + 2 =",a:["4","5","6","7"],d:2},
{q:"1🥈34️⃣5<br>6️⃣7❓9🔟<br>Số cần điền vào dấu hỏi chấm là:",a:["6","7","8","9"],d:2},
{q:"Số nào là số tròn chục:",a:["41","53","65","70"],d:3},
{q:"Đâu là khối lập phương?",a:["🧊","🥃","🧃"],d:0},
{q:"Hùng: 18 – Hải: 19 – Long: 16 – Dũng: 20<br>Ai ném phi tiêu giỏi nhất?",a:["Hùng","Hải","Dũng","Long"],d:2},
{q:"1: ⚽️⚽️⚽️⚽️<br>2: 🎾🎾🎾🎾🎾🎾🎾<br>3: 🏈🏈🏈<br>4: 🏀🏀🏀🏀🏀🏀🏀🏀🏀🏀<br>Số nào có bóng ít nhất?",a:["1","2","3","4"],d:2},
{q:"Tính: 9 - 3 =",a:["5","6","7","8"],d:1},
{q:"🚃23|24|25<br>🚃79|80|81<br>🚃58|59|?<br>Số cần điền là:",a:["58","59","60","61"],d:2},
{q:"Số gồm 4 chục và 1 đơn vị là:",a:["40","41","42","43"],d:1},
{q:"🚗🚗🚗🚗🚗<br>🚲🚲🚲<br>🛵🛵🛵🛵<br>✈️✈️<br>Xe nào dài nhất?",a:["🚗","✈️","🚲","🛵"],d:0},
{q:"30 + 50 → … - 20 → ?",a:["50","60","70","80"],d:1},
{q:"8 - 1 → … - 3 → ?",a:["2","3","4","5"],d:2},
{q:"So sánh: 10 - 1 … 2 + 6",a:["="," >", "<"],d:1},
{q:"9; … ; 5; 3; 1",a:["8","7","6","5"],d:1},
{q:"🍑🍑🍑🍑🍑 + 🍑🍑🍑🍑🍑 … 🍑🍑🍑 + 🍑🍑🍑🍑🍑🍑",a:["<","=",">"],d:2},
{q:"🦜 - 50 = 20<br>Con vẹt che số:",a:["60","70","80","90"],d:1},
{q:"7 - 1 → … - 5 → ?",a:["0","1","2","3"],d:1},
{q:"🚶🚶‍♂️🏃🚶‍♀️🏃‍♀️🏃‍♂️<br>Trước Yến có 3 bạn. Yến đứng số:",a:["2","3","4","5"],d:2},
{q:"Tính: 8 - 3 - 3 =",a:["1","2","3","4"],d:1},
{q:"   70<br>- ?0<br>────<br> 30<br>Dấu ? là:",a:["3","4","5","6"],d:1},
{q:"           🖌️<br>✏️       🖌️<br>✏️       🖌️ 🖊️<br>✏️ 🖍️ 🖌️ 🖊️<br>✏️ 🖍️ 🖌️ 🖊️ ✒️<br>2    ?                  5<br>Xếp bút từ thấp đến cao<br>Số cần điền là:",a:["3","4","5","6"],d:1},
{q:"🍇 + 🍇 = 8<br>Vậy 🍇 =",a:["2","3","4","5"],d:2},
{q:"1 + 4 < 3 + ? < 6 + 1",a:["2","3","4","5"],d:1},
{q:"? - 50 → … → +40 → 60",a:["60","70","80","90"],d:1},
{q:"8 + 1 > 8 + ?",a:["0","1","2","3"],d:0}
];

const quiz=document.getElementById("quiz");
quizData.forEach((q,i)=>{
let html=`<div class="q"><b>Câu ${i+1}:</b> ${q.q}<br>`;
q.a.forEach((ans,j)=>{
html+=`<label><input type="radio" name="q${i}" value="${j}"> ${ans}</label><br>`;
});
html+="</div>";
quiz.innerHTML+=html;
});

function startTest(){
let name=studentName.value;
if(!name){alert("Chọn học sinh!");return;}
currentStudent=name;
loginBox.classList.add("hidden");
testBox.classList.remove("hidden");
timer=setInterval(()=>{
let m=Math.floor(time/60),s=time%60;
timerSpan.innerText=m+":"+(s<10?"0":"")+s;
time--; if(time<0)submitTest();
},1000);
}

function submitTest(){
clearInterval(timer);
let score=0;
quizData.forEach((q,i)=>{
let c=document.querySelector(`input[name="q${i}"]:checked`);
if(c && Number(c.value)===q.d)score++;
});
let data=JSON.parse(localStorage.getItem("scores")||"[]");
data.push({name:currentStudent,score:score+"/26",time:new Date().toLocaleTimeString()});
localStorage.setItem("scores",JSON.stringify(data));
testBox.classList.add("hidden");
resultBox.classList.remove("hidden");
result.innerText="🎉 "+currentStudent+" đạt "+score+"/26 điểm";
}

function showTeacher(){
loginBox.classList.add("hidden");
teacherBox.classList.remove("hidden");
let data=JSON.parse(localStorage.getItem("scores")||"[]");
scoreTable.innerHTML=data.map((r,i)=>
`<tr><td>${i+1}</td><td>${r.name}</td><td>${r.score}</td><td>${r.time}</td></tr>`
).join("");
}

function backHome(){
teacherBox.classList.add("hidden");
loginBox.classList.remove("hidden");
}

const timerSpan=document.getElementById("timer");
</script>

</body>

</html>
